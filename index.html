		<script defer src="script.js" ></script>
		<script defer>
			fetch('rss.xml')
			.then(response => {
				console.log("1. rss.xmlの取得ステータス:", response.status);
				if (!response.ok) throw new Error('ネットワークエラー');
				return response.text();
			})
			.then(str => {
				console.log("2. 取得した文字列の長さ:", str.length);
				const parser = new DOMParser();
				const xmlDoc = parser.parseFromString(str, "text/xml");
				// パースエラーがないかチェック
				const parserError = xmlDoc.getElementsByTagName("parsererror");
				if (parserError.length > 0) {
					console.error("XMLのパースエラー:", parserError[0].textContent);
					throw new Error("XMLの形式が正しくありません");
				}
				const items = xmlDoc.getElementsByTagName("item");
				console.log("3. 見つかったitemの数:", items.length);
				// 画面の要素を待つ
				const setupList = () => {
					const list = document.getElementById("rss");
					if (!list) {
						console.error("4. エラー: id='rss' の要素が見つかりません");
						return;
					}
					if (items.length === 0) {
						list.innerHTML = "<li>お知らせはありません（itemが0件）</li>";
						return;
					}
					list.innerHTML = "";
					for (let i = 0; i < Math.min(items.length, 5); i++) {
						const titleEl = items[i].getElementsByTagName("title")[0];
						const linkEl = items[i].getElementsByTagName("link")[0];
						const title = titleEl ? titleEl.textContent : "タイトルなし";
						const link = linkEl ? linkEl.textContent : "#";
						const li = document.createElement("li");
						li.innerHTML = `<a href="${link}">${title}</a>`;
						list.appendChild(li);
					}
					console.log("5. 画面への追加が完了しました！");
				};

				if (document.readyState === 'loading') {
					document.addEventListener('DOMContentLoaded', setupList);
				} else {
					setupList();
				}
			})
			.catch(err => {
				console.error("キャッチされたエラー:", err);
				const showSubError = () => {
					const list = document.getElementById("rss");
					if (list) list.innerHTML = `<li>読み込み失敗: ${err.message}</li>`;
				};
				if (document.readyState === 'loading') {
					document.addEventListener('DOMContentLoaded', showSubError);
				} else {
					showSubError();
				}
			});
		</script>
