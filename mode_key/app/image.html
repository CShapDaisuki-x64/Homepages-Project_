<html>
	<head>
		<meta name="robots" content="noindex, nofollow">
		<style>
			body{
				overflow: hidden;
				height: 100%;
				form {
					width: 100%;
					.header{
						background-color: #aaa;
						height: 25px;
					}
				}
				.divimg{
						width: 100%;
						height: calc(100% - 25px);
						box-sizing: border-box;
						resize: none;
						background-image: linear-gradient(45deg, #bbb 25%, transparent 25%, transparent 75%, #bbb 75%),
							linear-gradient(45deg, #bbb 25%, transparent 25%, transparent 75%, #bbb 75%); /* 市松模様になるようグラデーションで単色を入れる */
						background-position: 0 0, 30px 30px;	/* 「0 0」と1マス（1色）の大きさ「30px 30px」をそれぞれ指定 */
						background-size: 60px 60px;					 /* 1マス分の倍の大きさを指定「60px 60px」 */
						background-color: #FFF;
						overflow: scroll;
						img{
							display: block;
							width: auto;
							height: auto;
							max-width: none;
							max-height: none;
						}
					}
			}
		</style>
		<script src="./script.js"></script>
		<script>
			{
				document.addEventListener('DOMContentLoaded', () => {
					let url = new URL(window.location.href);
					let params = url.searchParams;
					const file_load = document.querySelector('#file_load');
					const textarea = document.querySelector('#hil');
					if (params)
					{
						textarea.src = params.get("q");
					}
					file_load.addEventListener('change', e => {
					 	if (e.target.files[0]) {
						 	const file = URL.createObjectURL(e.target.files[0]);
						 	textarea.src = file;
						 	// ファイルの読み込みが完了した時の処理
							reader.onload = event => {
								textarea.src=file;
							};
							reader.readAsvideo(file);
					 	}
				 	});
				});
			}

		</script>
	</head>
	<body id="body">
		<form>
			<div class="header">
				<input id="file_load" type="file" accept="image/*">
			</div>
			<div class="divimg">
				<img controls id="hil" src="../img/image.webp" alt="画像を指定して下さい">
			</div>
		</form>
	</body>
</html>
